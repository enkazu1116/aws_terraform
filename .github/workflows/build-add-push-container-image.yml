name: build-add-push-container-image
on:
    workflow_dispatch:
        inputs:
            environment:
                description: "specify the image repository environment"
                required: true
                default: dev
            build_target:
                description: Tag name of branch name to deploy e.g. main, develop, v1.0.0 etc.
                required: true
                default: main
    workflow_call:
        secrets:
            IAM_ARN_TO_PUSH_IMAGE:
                required: true
permissions:
    id-token: write
    contents: read
jobs:
    build-add-push-container-image:
        timeout-minutes: 5
        runs-on: ubuntu-latest
        steps:
            - name: Resolve AWS role ARN
              id: resolve-role-arn
              env:
                ROLE_ARN_FROM_SECRET: ${{ secrets.IAM_ARN_TO_PUSH_IMAGE }}
                ROLE_ARN_FROM_VAR: ${{ vars.IAM_ARN_TO_PUSH_IMAGE }}
              run: |
                ROLE_ARN="${ROLE_ARN_FROM_SECRET:-$ROLE_ARN_FROM_VAR}"
                if [ -z "$ROLE_ARN" ]; then
                  echo "IAM_ARN_TO_PUSH_IMAGE is not set in secrets or vars."
                  exit 1
                fi
                echo "role-arn=${ROLE_ARN}" >> "$GITHUB_OUTPUT"
            - name: Checkout
              uses: actions/checkout@v2
              with:
                ref: ${{ github.event.inputs.build_target}}
            - name: Get image tag
              id : get-image-tag
              run: |
                SHORT_COMMIT_ID=`git rev-parse --short HEAD`
                REF=`echo ${{ github.event.inputs.build_target }} | sed -e 's/\//-/g'`
                echo "image-tag=${REF}-${SHORT_COMMIT_ID}" >> $GITHUB_OUTPUT
            - name: Assume role
              uses: aws-actions/configure-aws-credentials@v2
              with:
                role-to-assume: ${{ steps.resolve-role-arn.outputs.role-arn }}
                aws-region: ap-northeast-1
            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2
            - name: Build and push image to Amazon ECR
              uses: docker/build-push-action@v4
              with:
                context: "image"
                push: true
                tags: ${{ steps.login-ecr.outputs.registry}}/sample-${{ github.event.inputs.environment }}-web:${{ steps.get-image-tag.outputs.image-tag }}
